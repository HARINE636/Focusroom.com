<head>
<title>Focus Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Background Animation */
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(-45deg, #141e30, #243b55, #0f2027, #2c5364);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    color:white;
}

/* Smooth moving gradient */
@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* Main container fixed portrait style */
.container{
    width:95%;
    max-width:420px;   /* Portrait width limit */
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px 20px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
}

/* Buttons */
button{
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.primary{
    background:#00c6ff;
    color:black;
}

.danger{
    background:#ff4d4d;
    color:white;
}

select,input{
    width:90%;
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:none;
    margin-top:10px;
}

#timer{
    font-size:50px;
    margin-top:20px;
}

#quote{
    margin-top:15px;
    font-style:italic;
    opacity:0.9;
}

.hidden{
    display:none;
}

/* Extra mobile polish */
@media (max-width:480px){
    .container{
        padding:25px 15px;
    }
    #timer{
        font-size:42px;
    }
}

</style>
</head>

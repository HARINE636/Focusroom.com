<!DOCTYPE html>
<html>
<head>
<title>Deep Focus Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(-45deg, #1B3A57, #16324F, #0F2740, #1B3A57);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
    color:white;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container{
    width:95%;
    max-width:450px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:25px 20px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
}

.hidden{ display:none; }

button{
    padding:10px 18px;
    margin:6px;
    font-size:15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.primary{ background:#2E6F95; color:white; }
.danger{ background:#ff4d4d; color:white; }

input{
    width:90%;
    padding:8px;
    font-size:15px;
    border-radius:6px;
    border:none;
    margin-top:8px;
}

.task-card{
    background:rgba(255,255,255,0.12);
    padding:12px;
    border-radius:12px;
    margin-top:12px;
    text-align:left;
}

.task-card h4{
    margin:0 0 5px 0;
}

.task-card p{
    margin:0;
    font-size:14px;
    opacity:0.8;
}

#timer{
    font-size:42px;
    margin-top:20px;
}

#quote{
    font-size:16px;
    margin-top:15px;
    font-style:italic;
    opacity:0.9;
}

.footer{
    font-size:13px;
    margin-top:20px;
    opacity:0.85;
}

.footer a{
    color:#2E6F95;
    text-decoration:none;
    font-weight:600;
}

.footer a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">

<div id="nameSection">
    <h1>Deep Focus Room</h1>
    <input type="text" id="username" placeholder="Enter your name">
    <br><br>
    <button class="primary" onclick="enterApp()">Enter Focus Chamber</button>
</div>

<div id="appSection" class="hidden">

    <h3>Add Today's Tasks</h3>

    <input type="text" id="taskName" placeholder="Task name">
    <input type="number" id="taskTime" placeholder="Duration (minutes)">
    <br>
    <button class="primary" onclick="addTask()">Add Task</button>

    <div id="taskList"></div>

    <div id="focusSection" class="hidden">
        <h2 id="currentTaskTitle"></h2>
        <div id="timer"></div>
        <div id="quote"></div>
        <button class="danger" onclick="attemptExit()">Emergency Exit</button>
    </div>

</div>

<hr style="margin:25px 0; opacity:0.2;">

<div class="footer">
    <p><strong>Deep Focus Room</strong></p>
    <p>Created and designed by Harine.</p>
    <p>Built to promote intentional deep work and disciplined execution.</p>
    <p>
        Contact:
        <a href="mailto:harinemohankumar@gmail.com">harinemohankumar@gmail.com</a>
    </p>
    <p>
        Source Code:
        <a href="https://github.com/yourusername/repository-name" target="_blank">
            View on GitHub
        </a>
    </p>
    <p>Version 1.0 | © 2026 Harine</p>
</div>

<audio id="bgMusic" src="music.mp3" loop></audio>

</div>

<script>
let currentUser="";
let tasks=[];
let activeTaskIndex=null;
let interval;
let quoteInterval;
let exitWarningShown = false;

const quotes = [
    "Focus is the key to unlocking your potential.",
    "Discipline is choosing between what you want now and what you want most.",
    "Stay committed to your decisions, but stay flexible in your approach.",
    "Every step forward, no matter how small, counts.",
    "Your mind will quit 100 times before your body does—keep going."
];

/* ENTER APP */
function enterApp(){
    let name=document.getElementById("username").value.trim();
    if(name===""){ alert("Enter your name."); return; }

    currentUser=name;
    document.getElementById("nameSection").classList.add("hidden");
    document.getElementById("appSection").classList.remove("hidden");

    loadTasks();
}

/* LOCAL STORAGE */
function saveTasks(){
    localStorage.setItem("tasks_"+currentUser, JSON.stringify(tasks));
}

function loadTasks(){
    let stored=localStorage.getItem("tasks_"+currentUser);
    tasks= stored ? JSON.parse(stored) : [];
    renderTasks();
}

/* ADD TASK */
function addTask(){
    let name=document.getElementById("taskName").value.trim();
    let time=parseInt(document.getElementById("taskTime").value);

    if(name==="" || !time || time<=0){
        alert("Enter valid task and duration.");
        return;
    }

    tasks.push({name:name,time:time});
    saveTasks();
    renderTasks();

    document.getElementById("taskName").value="";
    document.getElementById("taskTime").value="";
}

/* RENDER TASKS WITH DELETE OPTION */
function renderTasks(){
    let list=document.getElementById("taskList");
    list.innerHTML="";

    tasks.forEach((task,index)=>{
        let div=document.createElement("div");
        div.className="task-card";
        div.innerHTML=`
            <h4>${task.name}</h4>
            <p>${task.time} minutes</p>
            <button class="primary" onclick="startTask(${index})">Start</button>
            <button class="danger" onclick="deleteTask(${index})">Delete</button>
        `;
        list.appendChild(div);
    });
}

/* DELETE TASK */
function deleteTask(index){
    tasks.splice(index,1);
    saveTasks();
    renderTasks();
}

/* START TASK */
function startTask(index){
    activeTaskIndex=index;
    let task=tasks[index];

    // Hide everything except focus section
    document.getElementById("taskList").classList.add("hidden");
    document.getElementById("taskName").classList.add("hidden");
    document.getElementById("taskTime").classList.add("hidden");
    document.querySelector("#appSection h3").classList.add("hidden");

    document.getElementById("focusSection").classList.remove("hidden");
    document.getElementById("currentTaskTitle").innerText=task.name;

    // Ask for volume confirmation first
    alert("Please set your device volume to a moderate level and click OK to start the timer.");

    let totalSeconds = task.time * 60;
    let music = document.getElementById("bgMusic");
    music.volume = 0.3;
    music.currentTime = 0;
    music.play().catch(()=>{});

    clearInterval(interval);
    clearInterval(quoteInterval);
    exitWarningShown = false;

    // Show first quote immediately
    updateQuote();

    // Timer countdown
    interval=setInterval(()=>{
        let m=Math.floor(totalSeconds/60);
        let s=totalSeconds%60;

        document.getElementById("timer").innerText=
            (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

        totalSeconds--;

        if(totalSeconds<0){
            clearInterval(interval);
            clearInterval(quoteInterval);
            music.pause();
            completeTask();
        }

    },1000);

    // Change quote every 15 minutes
    quoteInterval = setInterval(updateQuote, 15*60*1000);
}

/* UPDATE QUOTE */
function updateQuote(){
    let q = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById("quote").innerText = q;
}

/* ATTEMPT EXIT (EMERGENCY EXIT BUTTON) */
function attemptExit(){
    if(!exitWarningShown){
        alert("Are you sure you want to leave? Stay focused for your own growth!");
        exitWarningShown = true;
    } else {
        stopSession();
    }
}

/* COMPLETE TASK */
function completeTask(){
    if(activeTaskIndex!==null){
        tasks.splice(activeTaskIndex,1);
        saveTasks();
        renderTasks();
        document.getElementById("focusSection").classList.add("hidden");
        document.getElementById("timer").innerText="";
        document.getElementById("quote").innerText="";
        activeTaskIndex=null;

        // Show input/task list again
        document.getElementById("taskList").classList.remove("hidden");
        document.getElementById("taskName").classList.remove("hidden");
        document.getElementById("taskTime").classList.remove("hidden");
        document.querySelector("#appSection h3").classList.remove("hidden");

        alert("Task completed successfully.");
    }
}

/* STOP SESSION */
function stopSession(){
    clearInterval(interval);
    clearInterval(quoteInterval);
    document.getElementById("bgMusic").pause();
    document.getElementById("focusSection").classList.add("hidden");
    document.getElementById("timer").innerText="";
    document.getElementById("quote").innerText="";

    // Show input/task list again
    document.getElementById("taskList").classList.remove("hidden");
    document.getElementById("taskName").classList.remove("hidden");
    document.getElementById("taskTime").classList.remove("hidden");
    document.querySelector("#appSection h3").classList.remove("hidden");
}

/* WARN ON BROWSER BACK BUTTON DURING FOCUS SESSION */
window.addEventListener("beforeunload", function (e) {
    if(activeTaskIndex!==null){
        if(!exitWarningShown){
            exitWarningShown = true;
            e.preventDefault();
            e.returnValue = "Are you sure you want to leave? Stay focused for your own growth!";
            return "Are you sure you want to leave? Stay focused for your own growth!";
        }
    }
});
</script>

</body>
</html>

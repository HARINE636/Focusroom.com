<!DOCTYPE html>
<html>
<head>
<title>Focus Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1e3c72);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    color:white;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container{
    width:95%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:30px 20px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    text-align:center;
}

.hidden{
    display:none;
}

button{
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.primary{
    background:#00c6ff;
    color:black;
}

.danger{
    background:#ff4d4d;
    color:white;
}

select,input{
    width:90%;
    padding:10px;
    font-size:16px;
    border-radius:6px;
    border:none;
    margin-top:10px;
}

#timer{
    font-size:50px;
    margin-top:20px;
}

#quote{
    margin-top:15px;
    font-style:italic;
    opacity:0.9;
}

@media (max-width:480px){
    .container{
        padding:25px 15px;
    }
    #timer{
        font-size:42px;
    }
}

</style>
</head>

<body>

<div class="container">

<!-- Name Section -->
<div id="nameSection">
    <h1>Focus Room</h1>
    <input type="text" id="username" placeholder="Enter your name">
    <br><br>
    <button class="primary" onclick="showConfirmation()">Enter Focus Chamber</button>
</div>

<!-- Confirmation Section -->
<div id="confirmSection" class="hidden">
    <h2>Can we dive into deep focus?</h2>
    <button class="primary" onclick="enterRoom()">Yup</button>
</div>

<!-- Timer Section -->
<div id="timerSection" class="hidden">
    <h2>Deep Focus Mode</h2>

    <br>

    <select id="timeSelect">
        <option value="15">15 Minutes</option>
        <option value="30">30 Minutes</option>
        <option value="45">45 Minutes</option>
        <option value="60">60 Minutes</option>
    </select>

    <br><br>

    <button class="primary" onclick="startTimer()">Start Focus</button>
    <button class="danger" onclick="emergencyExit()">Emergency Exit</button>

    <div id="timer"></div>
    <div id="quote"></div>
</div>

<audio id="bgMusic" src="music.mp3" loop></audio>

</div>

<script>

let interval;
let currentUser="";
let exitPressed=false;

const quotes=[
"Stay focused. Your goals matter.",
"Discipline creates freedom.",
"One session at a time.",
"Focus now. Win later."
];

function showConfirmation(){
    let name=document.getElementById("username").value.trim();
    if(name===""){
        alert("Enter your name");
        return;
    }
    currentUser=name;
    document.getElementById("nameSection").classList.add("hidden");
    document.getElementById("confirmSection").classList.remove("hidden");
}

function enterRoom(){
    document.getElementById("confirmSection").classList.add("hidden");
    document.getElementById("timerSection").classList.remove("hidden");
}

function startTimer(){
    let minutes=parseInt(document.getElementById("timeSelect").value);
    let totalSeconds=minutes*60;

    let music=document.getElementById("bgMusic");
    music.currentTime=0;
    music.play().catch(()=>{});

    document.getElementById("quote").innerText=
        quotes[Math.floor(Math.random()*quotes.length)];

    interval=setInterval(function(){
        let m=Math.floor(totalSeconds/60);
        let s=totalSeconds%60;
        document.getElementById("timer").innerText=
            (m<10?"0":"")+m+":"+(s<10?"0":"")+s;

        totalSeconds--;

        if(totalSeconds<0){
            clearInterval(interval);
            music.pause();
            alert("Session Completed!");
        }
    },1000);
}

function emergencyExit(){
    if(!exitPressed){
        alert("Are you sure? Focus is still running.");
        exitPressed=true;
    }
    else{
        clearInterval(interval);
        document.getElementById("bgMusic").pause();
        location.reload();
    }
}

</script>

</body>
</html>
